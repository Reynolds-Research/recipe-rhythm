name: Audit — AI Prompt Quality

# Weekly. Particularly important given the active PRD-004/006 prompt work.

on:
  schedule:
    - cron: '30 14 * * 2' # Tuesdays 14:30 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Run Gemini audit
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          gemini --yolo --skip-trust --prompt "$(cat audits/prompts/10-ai-prompt-quality.md)" > audit-output.md

      - name: Open GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          gh issue create \
            --title "AI prompt quality audit — $DATE" \
            --label "audit,audit:ai-prompts" \
            --body-file audit-output.md
