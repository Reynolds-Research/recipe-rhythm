name: Audit — Test Coverage Gaps

# Weekly. Surfaces critical-flow and recent-commit coverage holes.

on:
  schedule:
    - cron: '0 14 * * 2' # Tuesdays 14:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (fetch full history for git log analysis)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed so Gemini can read recent commits

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Run Gemini audit
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          gemini --yolo --prompt-file audits/prompts/07-test-coverage.md > audit-output.md

      - name: Open GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          gh issue create \
            --title "Test coverage audit — $DATE" \
            --label "audit,audit:tests" \
            --body-file audit-output.md
